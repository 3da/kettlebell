<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Подсчёт рывков гири | MediaPipe Pose</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: #121520;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px;
      margin: 0;
      color: #f0f2f5;
      touch-action: manipulation;
    }

    .container {
      width: 100%;
      max-width: 480px;
      background: rgba(22, 26, 36, 0.95);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 32px;
      padding: 16px 14px 24px;
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.7), inset 0 1px 1px rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.06);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      font-size: clamp(1.6rem, 5vw, 2rem);
      font-weight: 700;
      letter-spacing: -0.3px;
      background: linear-gradient(to right, #f7971e, #ffd200);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .subtitle {
      font-weight: 400;
      color: #9aa0b5;
      margin-bottom: 10px;
      font-size: 0.8rem;
      background: rgba(255, 255, 255, 0.04);
      padding: 4px 16px;
      border-radius: 24px;
    }

    /* Переключатель режимов */
    .mode-selector {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
      background: rgba(16, 19, 28, 0.7);
      border-radius: 40px;
      padding: 4px;
      width: 100%;
      max-width: 380px;
    }

    .mode-btn {
      flex: 1;
      padding: 10px 8px;
      border-radius: 36px;
      border: none;
      background: transparent;
      color: #8890aa;
      font-weight: 600;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      touch-action: manipulation;
    }

    .mode-btn.active {
      background: linear-gradient(135deg, #f5a623, #c97a0a);
      color: #0a0c12;
      box-shadow: 0 4px 12px rgba(245, 166, 35, 0.35);
      font-weight: 700;
    }

    .mode-btn:active {
      transform: scale(0.96);
    }

    .video-wrapper {
      position: relative;
      width: 100%;
      max-width: 100%;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 16px 28px rgba(0,0,0,0.7);
      margin-bottom: 16px;
      background: #05070c;
      aspect-ratio: 4/3;
    }

    video, canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform: scaleX(-1);
    }

    canvas {
      z-index: 10;
    }

    /* Панель с таймером и счётчиком */
    .stats-panel {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 18px;
      width: 100%;
    }

    .counter-panel, .timer-panel {
      background: rgba(16, 19, 28, 0.85);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 80px;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 1px solid rgba(255, 215, 0, 0.2);
      box-shadow: 0 10px 20px rgba(0,0,0,0.5);
    }

    .timer-panel {
      border: 1px solid rgba(100, 180, 255, 0.25);
      gap: 6px;
    }

    .count-box, .timer-box {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    .count-label, .timer-label {
      font-weight: 600;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #a0a9c4;
    }

    .timer-label {
      color: #8ea4c7;
    }

    .count-number {
      font-size: clamp(2.2rem, 8vw, 2.8rem);
      font-weight: 700;
      background: linear-gradient(to bottom, #ffe79e, #e6961c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      min-width: 48px;
      text-align: center;
    }

    .timer-number {
      font-size: clamp(1.7rem, 6vw, 2.2rem);
      font-weight: 700;
      background: linear-gradient(to bottom, #c2e0ff, #4d8fda);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      min-width: 60px;
      text-align: center;
      font-variant-numeric: tabular-nums;
      letter-spacing: 1px;
    }

    .state-badge {
      background: #262d3b;
      padding: 8px 16px;
      border-radius: 36px;
      font-weight: 600;
      font-size: 0.7rem;
      color: #cfd7ea;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .state-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #aaa;
      display: inline-block;
    }
    .state-dot.active {
      background: #4cff8c;
      box-shadow: 0 0 14px #1ce65f;
    }
    .state-dot.idle {
      background: #ffb347;
    }

    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin: 4px 0 10px;
      width: 100%;
    }

    .btn {
      background: #2f3547;
      border: none;
      padding: 13px 20px;
      border-radius: 48px;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.5px;
      color: #eef3ff;
      cursor: pointer;
      background: linear-gradient(135deg, #3b4254, #242a38);
      box-shadow: 0 8px 16px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.08);
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      gap: 6px;
      border: 1px solid rgba(255,255,255,0.05);
      text-transform: uppercase;
      flex: 1;
      justify-content: center;
      min-width: 100px;
      touch-action: manipulation;
    }

    .btn:active {
      transform: scale(0.96);
      box-shadow: 0 4px 10px rgba(0,0,0,0.6);
    }

    .start-btn {
      background: linear-gradient(135deg, #f5a623, #c97a0a);
      color: #0a0c12;
      border: 1px solid rgba(255,200,0,0.5);
      font-weight: 700;
    }

    .stop-btn {
      background: linear-gradient(135deg, #e63946, #a61b2a);
      color: white;
      border: 1px solid rgba(255,100,100,0.35);
    }

    .btn:disabled {
      opacity: 0.45;
      pointer-events: none;
      filter: grayscale(0.5);
    }

    .guide-text {
      font-size: 0.68rem;
      color: #7e869c;
      margin-top: 6px;
      display: flex;
      align-items: center;
      gap: 4px;
      text-align: center;
      padding: 0 8px;
    }

    @media (max-width: 400px) {
      .container {
        padding: 12px 10px 20px;
        border-radius: 24px;
      }
      .btn {
        padding: 12px 14px;
        font-size: 0.8rem;
        gap: 4px;
      }
      .stats-panel {
        gap: 8px;
      }
      .counter-panel, .timer-panel {
        padding: 8px 14px;
      }
      .mode-btn {
        font-size: 0.7rem;
        padding: 8px 6px;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>🏋️ Гиревой спорт</h1>
  <div class="subtitle">MediaPipe Pose · отслеживание</div>

  <!-- Переключатель режимов -->
  <div class="mode-selector" id="modeSelector">
    <button class="mode-btn active" data-mode="snatch">Рывок</button>
    <button class="mode-btn" data-mode="jerk">Толчок</button>
    <button class="mode-btn" data-mode="fullCycle">Полный цикл</button>
  </div>

  <div class="video-wrapper">
    <video id="inputVideo" autoplay playsinline muted></video>
    <canvas id="outputCanvas"></canvas>
  </div>

  <div class="stats-panel">
    <div class="counter-panel">
      <div class="count-box">
        <span class="count-label">Повторы</span>
        <span class="count-number" id="repCounter">0</span>
      </div>
    </div>
    
    <div class="timer-panel">
      <div class="timer-box">
        <span class="timer-label">⏱️</span>
        <span class="timer-number" id="timerDisplay">00:00</span>
      </div>
    </div>
    
    <div class="state-badge">
      <span class="state-dot" id="stateDot"></span>
      <span id="statusText">Ожидание</span>
    </div>
  </div>

  <div class="controls">
    <button class="btn start-btn" id="startBtn">
      <span>▶</span> Старт
    </button>
    <button class="btn stop-btn" id="stopBtn">
      <span>⏹️</span> Стоп
    </button>
  </div>
  <div class="guide-text" id="guideText">
    <span>💡 Рывок: рука снизу вверх над плечом</span>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>

<script>
  (function() {
    // ---------- DOM элементы ----------
    const videoElement = document.getElementById('inputVideo');
    const canvasElement = document.getElementById('outputCanvas');
    const ctx = canvasElement.getContext('2d');
    const repCounterSpan = document.getElementById('repCounter');
    const timerDisplay = document.getElementById('timerDisplay');
    const stateDot = document.getElementById('stateDot');
    const statusText = document.getElementById('statusText');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const guideText = document.getElementById('guideText');
    const modeButtons = document.querySelectorAll('.mode-btn');

    // ---------- Глобальные переменные ----------
    let pose;
    let cameraInstance = null;
    let isActive = false;
    let repetitions = 0;
    
    // Текущий режим
    let currentMode = 'snatch'; // 'snatch', 'jerk', 'fullCycle'
    
    // Параметры оптимизации
    const MOBILE_WIDTH = 480;
    const MOBILE_HEIGHT = 360;
    const FRAME_SKIP = 2;
    let frameCounter = 0;
    
    // Пороги для разных режимов
    const SNATCH_DOWN_THRESHOLD = 0.15;    // запястье ниже плеча
    const SNATCH_UP_THRESHOLD = -0.25;     // запястье выше плеча
    
    const JERK_DOWN_THRESHOLD = 0.05;      // запястье на уровне груди (чуть ниже плеча)
    const JERK_UP_THRESHOLD = -0.25;       // запястье выше плеча
    
    // Состояния для конечных автоматов
    let armState = 'DOWN'; // 'DOWN', 'UP'
    let lastArmYRelative = null;

    // ---------- Таймер ----------
    let timerInterval = null;
    let startTime = null;
    let elapsedSeconds = 0;

    function formatTime(totalSeconds) {
      const mins = Math.floor(totalSeconds / 60);
      const secs = totalSeconds % 60;
      return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
    }

    function updateTimerDisplay() {
      timerDisplay.textContent = formatTime(elapsedSeconds);
    }

    function startTimer() {
      if (timerInterval) return;
      startTime = Date.now() - (elapsedSeconds * 1000);
      timerInterval = setInterval(() => {
        elapsedSeconds = Math.floor((Date.now() - startTime) / 1000);
        updateTimerDisplay();
      }, 200);
    }

    function stopTimer() {
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
    }

    function resetTimer() {
      stopTimer();
      elapsedSeconds = 0;
      updateTimerDisplay();
    }

    // ---------- UI функции ----------
    function updateUI() {
      repCounterSpan.textContent = repetitions;
    }

    function setStatus(state, dotClass) {
      stateDot.className = 'state-dot ' + dotClass;
      statusText.textContent = state;
    }

    function resetCounterAndState() {
      repetitions = 0;
      armState = 'DOWN';
      lastArmYRelative = null;
      updateUI();
    }

    function updateGuideText() {
      switch(currentMode) {
        case 'snatch':
          guideText.innerHTML = '<span>💡 Рывок: рука снизу вверх над плечом</span>';
          break;
        case 'jerk':
          guideText.innerHTML = '<span>💡 Толчок: от груди вверх на вытянутые руки</span>';
          break;
        case 'fullCycle':
          guideText.innerHTML = '<span>💡 Полный цикл: опускание ниже пояса → подъём над плечом</span>';
          break;
      }
    }

    // ---------- Переключение режимов ----------
    modeButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        if (isActive) {
          if (!confirm('Смена режима во время подсчёта сбросит счётчик и состояние. Продолжить?')) {
            return;
          }
        }
        
        modeButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentMode = btn.dataset.mode;
        
        resetCounterAndState();
        updateGuideText();
        
        if (isActive) {
          setStatus('Режим сменён', 'idle');
        }
        
        console.log('Режим переключен на:', currentMode);
      });
      
      btn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        btn.click();
      });
    });

    // ---------- Обработка Pose ----------
    function onPoseResults(results) {
      frameCounter++;
      if (frameCounter % FRAME_SKIP !== 0) {
        drawPose(results);
        return;
      }
      
      drawPose(results);
      
      if (results.poseLandmarks && isActive) {
        processPoseForReps(results.poseLandmarks);
      }
    }

    function drawPose(results) {
      ctx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      
      if (videoElement.videoWidth && videoElement.videoHeight) {
        canvasElement.width = videoElement.videoWidth;
        canvasElement.height = videoElement.videoHeight;
      }

      if (results.poseLandmarks) {
        window.drawConnectors(ctx, results.poseLandmarks, window.POSE_CONNECTIONS, 
          { color: '#ffd966', lineWidth: 1.8 });
        window.drawLandmarks(ctx, results.poseLandmarks, 
          { color: '#ff9f2f', lineWidth: 1.2, radius: 2.5 });
      }
    }

    function processPoseForReps(landmarks) {
      if (!landmarks || landmarks.length < 17) return;
      
      // Используем правую руку как основную
      const rightShoulder = landmarks[12];
      const rightWrist = landmarks[16];
      const rightElbow = landmarks[14];
      
      if (rightShoulder.visibility < 0.5 || rightWrist.visibility < 0.5) {
        return;
      }

      const relativeY = rightWrist.y - rightShoulder.y;
      lastArmYRelative = relativeY;

      let downThreshold, upThreshold;
      let stateMessage = '';

      // Выбираем пороги в зависимости от режима
      switch(currentMode) {
        case 'snatch':
          downThreshold = SNATCH_DOWN_THRESHOLD;
          upThreshold = SNATCH_UP_THRESHOLD;
          stateMessage = 'Рывок';
          break;
        case 'jerk':
          downThreshold = JERK_DOWN_THRESHOLD;
          upThreshold = JERK_UP_THRESHOLD;
          stateMessage = 'Толчок';
          break;
        case 'fullCycle':
          downThreshold = SNATCH_DOWN_THRESHOLD;
          upThreshold = SNATCH_UP_THRESHOLD;
          stateMessage = 'Цикл';
          break;
      }

      // Конечный автомат: счётчик увеличивается при ПОДЪЁМЕ руки
      if (armState === 'DOWN') {
        // Ждём подъёма руки выше порога
        if (relativeY < upThreshold) {
          // Проверка для толчка: рука должна быть выпрямлена
          if (currentMode === 'jerk') {
            const elbowAngle = calculateElbowAngle(rightShoulder, rightElbow, rightWrist);
            if (elbowAngle < 150) {
              // Рука недостаточно выпрямлена, не считаем
              console.log('Толчок: рука согнута, повтор не засчитан');
              return;
            }
          }
          
          // Засчитываем повторение в момент подъёма
          repetitions++;
          updateUI();
          armState = 'UP';
          console.log(`${stateMessage}: подъём! Повторение ${repetitions}`);
          if (isActive) setStatus('Подъём!', 'active');
        }
      } else if (armState === 'UP') {
        // Ждём опускания руки ниже порога для сброса состояния
        if (relativeY > downThreshold) {
          armState = 'DOWN';
          console.log(`${stateMessage}: рука опущена, готов к следующему повтору`);
          if (isActive) setStatus('Рука внизу', 'idle');
        }
      }
      
      // Обновляем статус если нужно
      if (isActive) {
        if (armState === 'DOWN' && relativeY > downThreshold) {
          setStatus('Рука внизу', 'idle');
        } else if (armState === 'UP' && relativeY < upThreshold) {
          setStatus('Рука вверху', 'active');
        }
      }
    }

    // Вычисление угла в локтевом суставе
    function calculateElbowAngle(shoulder, elbow, wrist) {
      const vector1 = {
        x: elbow.x - shoulder.x,
        y: elbow.y - shoulder.y
      };
      const vector2 = {
        x: wrist.x - elbow.x,
        y: wrist.y - elbow.y
      };
      
      const dotProduct = vector1.x * vector2.x + vector1.y * vector2.y;
      const magnitude1 = Math.sqrt(vector1.x * vector1.x + vector1.y * vector1.y);
      const magnitude2 = Math.sqrt(vector2.x * vector2.x + vector2.y * vector2.y);
      
      if (magnitude1 === 0 || magnitude2 === 0) return 0;
      
      const cosAngle = dotProduct / (magnitude1 * magnitude2);
      const angleRad = Math.acos(Math.max(-1, Math.min(1, cosAngle)));
      return angleRad * (180 / Math.PI);
    }

    // ---------- Инициализация MediaPipe ----------
    async function initPose() {
      pose = new Pose({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
      });
      
      pose.setOptions({
        modelComplexity: 0,
        smoothLandmarks: true,
        enableSegmentation: false,
        smoothSegmentation: false,
        minDetectionConfidence: 0.6,
        minTrackingConfidence: 0.5
      });

      pose.onResults(onPoseResults);
    }

    // ---------- Управление камерой ----------
    async function startCamera() {
      if (cameraInstance) return;
      
      if (!pose) {
        await initPose();
      }

      const Camera = window.Camera;
      cameraInstance = new Camera(videoElement, {
        onFrame: async () => {
          if (pose && videoElement.readyState >= 2) {
            await pose.send({ image: videoElement });
          }
        },
        width: MOBILE_WIDTH,
        height: MOBILE_HEIGHT,
        facingMode: 'user',
        frameRate: 24
      });

      try {
        await cameraInstance.start();
        console.log('Камера запущена');
      } catch (err) {
        console.error('Ошибка камеры:', err);
        alert('Не удалось получить доступ к камере.');
        cameraInstance = null;
        throw err;
      }
    }

    function stopCamera() {
      if (cameraInstance) {
        cameraInstance.stop();
        cameraInstance = null;
        ctx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      }
    }

    // ---------- Обработчики кнопок ----------
    async function onStart() {
      if (isActive) return;
      
      try {
        if (!cameraInstance) {
          await startCamera();
        }
        
        resetCounterAndState();
        resetTimer();
        startTimer();
        
        isActive = true;
        frameCounter = 0;
        
        startBtn.disabled = true;
        stopBtn.disabled = false;
        setStatus('Активен', 'active');
      } catch (e) {
        console.error(e);
      }
    }

    function onStop() {
      if (!isActive) return;
      
      isActive = false;
      stopTimer();
      
      startBtn.disabled = false;
      stopBtn.disabled = true;
      setStatus('Остановлен', 'idle');
    }

    startBtn.addEventListener('click', onStart);
    stopBtn.addEventListener('click', onStop);
    
    [startBtn, stopBtn].forEach(btn => {
      btn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        btn.click();
      });
    });

    // ---------- Запуск ----------
    async function bootstrap() {
      await initPose();
      
      stopBtn.disabled = true;
      startBtn.disabled = false;
      setStatus('Готов к старту', 'idle');
      updateUI();
      updateTimerDisplay();
      updateGuideText();
      
      window.addEventListener('orientationchange', () => {
        setTimeout(() => {
          if (cameraInstance && isActive) {
            console.log('Ориентация изменена');
          }
        }, 300);
      });
    }

    bootstrap().catch(err => console.error('Ошибка инициализации:', err));

    window.addEventListener('beforeunload', () => {
      stopTimer();
      if (cameraInstance) {
        cameraInstance.stop();
      }
    });

  })();
</script>
</body>
</html>
