<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <title>Подсчёт толчков\рывков гири</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
        -webkit-user-select: none;
        user-select: none;
      }

      body {
        font-family: "Montserrat", sans-serif;
        background: #121520;
        min-height: 100vh;
        min-height: -webkit-fill-available;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 12px;
        margin: 0;
        color: #f0f2f5;
        touch-action: manipulation;
      }

      .container {
        width: 100%;
        max-width: 480px;
        background: rgba(22, 26, 36, 0.95);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border-radius: 32px;
        padding: 16px 14px 20px;
        box-shadow: 0 25px 45px rgba(0, 0, 0, 0.7),
          inset 0 1px 1px rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.06);
        display: flex;
        flex-direction: column;
        align-items: center;
        max-height: 100vh;
        overflow-y: auto;
      }

      h1 {
        font-size: clamp(1.5rem, 5vw, 1.9rem);
        font-weight: 700;
        letter-spacing: -0.3px;
        background: linear-gradient(to right, #f7971e, #ffd200);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 2px;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .subtitle {
        font-weight: 400;
        color: #9aa0b5;
        margin-bottom: 8px;
        font-size: 0.75rem;
        background: rgba(255, 255, 255, 0.04);
        padding: 3px 14px;
        border-radius: 24px;
      }

      .hand-selector {
        display: flex;
        gap: 4px;
        margin-bottom: 8px;
        background: rgba(16, 19, 28, 0.7);
        border-radius: 40px;
        padding: 3px;
        width: 100%;
        max-width: 380px;
      }

      .hand-btn {
        flex: 1;
        padding: 8px 6px;
        border-radius: 36px;
        border: none;
        background: transparent;
        color: #8890aa;
        font-weight: 600;
        font-size: 0.7rem;
        cursor: pointer;
        transition: all 0.2s ease;
        white-space: nowrap;
        text-transform: uppercase;
        letter-spacing: 0.3px;
        touch-action: manipulation;
      }

      .hand-btn.active {
        background: linear-gradient(135deg, #4d8fda, #2a5c9e);
        color: white;
        box-shadow: 0 4px 12px rgba(77, 143, 218, 0.35);
        font-weight: 700;
      }

      .angle-settings {
        background: rgba(16, 19, 28, 0.6);
        border-radius: 16px;
        padding: 10px 14px;
        margin-bottom: 10px;
        width: 100%;
        max-width: 380px;
        border: 1px solid rgba(255, 255, 255, 0.06);
      }

      .angle-settings-title {
        font-size: 0.65rem;
        font-weight: 600;
        color: #8890aa;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .angle-slider-group {
        width: 100%;
      }

      .angle-slider-label {
        display: flex;
        justify-content: space-between;
        font-size: 0.6rem;
        color: #b0b8cc;
        margin-bottom: 2px;
      }

      .angle-slider-label span:last-child {
        font-weight: 700;
        color: #ffd200;
      }

      .fixation-mode {
        display: flex;
        gap: 4px;
        margin-top: 10px;
        background: rgba(16, 19, 28, 0.7);
        border-radius: 40px;
        padding: 3px;
        width: 100%;
      }

      .fixation-btn {
        flex: 1;
        padding: 8px 6px;
        border-radius: 36px;
        border: none;
        background: linear-gradient(135deg, #fffc61, #e2ff93);
        color: #0a0c12;
        font-weight: 600;
        font-size: 0.7rem;
        cursor: pointer;
        transition: all 0.2s ease;
        white-space: nowrap;
        text-transform: uppercase;
        letter-spacing: 0.3px;
        touch-action: manipulation;
      }

      .fixation-btn.active {
        background: linear-gradient(135deg, #f5a623, #c97a0a);
        color: #0a0c12;
        box-shadow: 0 4px 12px rgba(245, 166, 35, 0.35);
        font-weight: 700;
      }

      .record-checkbox-wrapper {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
        background: rgba(16, 19, 28, 0.6);
        border-radius: 40px;
        padding: 8px 16px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        width: fit-content;
        align-self: center;
      }

      .record-checkbox-wrapper input[type="checkbox"] {
        -webkit-appearance: none;
        width: 20px;
        height: 20px;
        background: #2d3342;
        border-radius: 6px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        cursor: pointer;
        position: relative;
        flex-shrink: 0;
      }

      .record-checkbox-wrapper input[type="checkbox"]:checked {
        background: linear-gradient(135deg, #e63946, #a61b2a);
        border-color: rgba(255, 100, 100, 0.5);
      }

      .record-checkbox-wrapper input[type="checkbox"]:checked::after {
        content: "✓";
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: white;
        font-size: 12px;
        font-weight: bold;
      }

      .record-checkbox-wrapper label {
        font-size: 0.7rem;
        font-weight: 600;
        color: #cfd7ea;
        cursor: pointer;
        white-space: nowrap;
        text-transform: uppercase;
        letter-spacing: 0.3px;
      }

      input[type="range"] {
        width: 100%;
        height: 4px;
        -webkit-appearance: none;
        background: #2d3342;
        border-radius: 2px;
        outline: none;
        margin: 6px 0;
      }

      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 22px;
        height: 22px;
        background: linear-gradient(135deg, #f5a623, #c97a0a);
        border-radius: 50%;
        cursor: pointer;
        border: 2px solid #1a1e2b;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
      }

      .video-wrapper {
        position: relative;
        width: 100%;
        max-width: 100%;
        border-radius: 24px;
        overflow: hidden;
        box-shadow: 0 16px 28px rgba(0, 0, 0, 0.7);
        margin-bottom: 12px;
        background: #05070c;
      }

      video,
      canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: block;
        transform: scaleX(-1);
      }

      canvas {
        z-index: 10;
      }

      .stats-panel {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin-bottom: 12px;
        width: 100%;
      }

      .counter-panel,
      .timer-panel {
        background: rgba(16, 19, 28, 0.85);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border-radius: 60px;
        padding: 8px 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        border: 1px solid rgba(255, 215, 0, 0.2);
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.5);
      }

      .timer-panel {
        border: 1px solid rgba(100, 180, 255, 0.25);
      }

      .count-box,
      .timer-box {
        display: flex;
        align-items: baseline;
        gap: 4px;
      }

      .count-label,
      .timer-label {
        font-weight: 600;
        font-size: 0.65rem;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        color: #a0a9c4;
      }

      .timer-label {
        color: #8ea4c7;
      }

      .count-number {
        font-size: clamp(2rem, 7vw, 2.5rem);
        font-weight: 700;
        background: linear-gradient(to bottom, #ffe79e, #e6961c);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1;
        min-width: 40px;
        text-align: center;
      }

      .timer-number {
        font-size: clamp(1.5rem, 5vw, 1.9rem);
        font-weight: 700;
        background: linear-gradient(to bottom, #c2e0ff, #4d8fda);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1;
        min-width: 50px;
        text-align: center;
        font-variant-numeric: tabular-nums;
        letter-spacing: 0.8px;
      }

      .state-badge {
        background: #262d3b;
        padding: 6px 12px;
        border-radius: 30px;
        font-weight: 600;
        font-size: 0.65rem;
        color: #cfd7ea;
        display: flex;
        align-items: center;
        gap: 4px;
        white-space: nowrap;
      }

      .hand-indicators {
        display: flex;
        gap: 8px;
      }

      .hand-indicator {
        display: flex;
        align-items: center;
        gap: 3px;
        font-size: 0.6rem;
        color: #8890aa;
      }

      .hand-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #555;
      }
      .hand-dot.right-up {
        background: #4cff8c;
        box-shadow: 0 0 8px #1ce65f;
      }
      .hand-dot.left-up {
        background: #4cff8c;
        box-shadow: 0 0 8px #1ce65f;
      }
      .hand-dot.down {
        background: #ffb347;
      }
      .hand-dot.angle {
        background: #ff4444;
        box-shadow: 0 0 8px #ff0000;
      }

      .state-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #aaa;
        display: inline-block;
      }
      .state-dot.active {
        background: #4cff8c;
        box-shadow: 0 0 14px #1ce65f;
      }
      .state-dot.idle {
        background: #ffb347;
      }

      .controls {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
        margin: 2px 0 8px;
        width: 100%;
      }

      .btn {
        background: #2f3547;
        border: none;
        padding: 11px 16px;
        border-radius: 40px;
        font-weight: 700;
        font-size: 0.85rem;
        letter-spacing: 0.4px;
        color: #eef3ff;
        cursor: pointer;
        background: linear-gradient(135deg, #3b4254, #242a38);
        box-shadow: 0 6px 14px rgba(0, 0, 0, 0.45),
          inset 0 1px 0 rgba(255, 255, 255, 0.08);
        transition: all 0.15s ease;
        display: flex;
        align-items: center;
        gap: 4px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        text-transform: uppercase;
        flex: 1;
        justify-content: center;
        min-width: 90px;
        touch-action: manipulation;
      }

      .btn:active {
        transform: scale(0.96);
      }

      .start-btn {
        background: linear-gradient(135deg, #f5a623, #c97a0a);
        color: #0a0c12;
        border: 1px solid rgba(255, 200, 0, 0.5);
      }

      .stop-btn {
        background: linear-gradient(135deg, #e63946, #a61b2a);
        color: white;
        border: 1px solid rgba(255, 100, 100, 0.35);
      }

      .btn:disabled {
        opacity: 0.4;
        pointer-events: none;
        filter: grayscale(0.5);
      }

      .guide-text {
        font-size: 0.6rem;
        color: #7e869c;
        margin-top: 2px;
        display: flex;
        align-items: center;
        gap: 3px;
        text-align: center;
      }

      @media (max-width: 400px) {
        .container {
          padding: 10px 8px 16px;
        }
        .btn {
          padding: 10px 12px;
          font-size: 0.78rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🏋️ Гиревой спорт</h1>
      <div class="subtitle">Подсчёт повторений</div>

      <div class="hand-selector" id="handSelector">
        <button class="hand-btn active" data-hand="single">
          Одна рука (любая)
        </button>
        <button class="hand-btn" data-hand="both">Две руки вместе</button>
      </div>

      <div class="angle-settings" style="display: none">
        <div class="angle-settings-title">🎯 Минимальный угол в локте</div>
        <div class="angle-slider-group">
          <div class="angle-slider-label">
            <span>Угол для засчитывания</span>
            <span id="minAngleValue">150°</span>
          </div>
          <input
            type="range"
            id="minAngleSlider"
            min="90"
            max="180"
            value="150"
            step="1"
          />
        </div>
        <div class="fixation-mode" id="fixationSelector">
          <button class="fixation-btn" data-mode="with-fixation">
            С фиксацией
          </button>
          <button class="fixation-btn" data-mode="without-fixation">
            Без фиксации
          </button>
        </div>
      </div>

      <div class="record-checkbox-wrapper">
        <input type="checkbox" id="recordCheckbox" />
        <label for="recordCheckbox">Записывать видео</label>
      </div>
      <div class="controls">
        <button class="btn start-btn" id="startBtn">
          <span>▶</span> Старт
        </button>
      </div>
    </div>
    <!-- Yandex.Metrika counter -->
    <script type="text/javascript">
      (function (m, e, t, r, i, k, a) {
        m[i] =
          m[i] ||
          function () {

        for (var j = 0; j < document.scripts.length; j++) {

        (k = e.createElement(t)),
          (a = e.getElementsByTagName(t)[0]),

        window,
        document,

      );

      ym(109825894, "init", {
        ssr: true,
        clickmap: true,
        ecommerce: "dataLayer",
        referrer: document.referrer,

        accurateTrackBounce: true,
        trackLinks: true,
      });
    </script>
    <noscript
      ><div>
        <img
          src="https://mc.yandex.ru/watch/109825894"
          style="position: absolute; left: -9999px"
          alt=""
        /></div
    ></noscript>
    <!-- /Yandex.Metrika counter -->
    <script>
      (function () {
        const startBtn = document.getElementById("startBtn");
        const handButtons = document.querySelectorAll(".hand-btn");
        const minAngleSlider = document.getElementById("minAngleSlider");
        const minAngleValue = document.getElementById("minAngleValue");
        const recordCheckBox = document.getElementById("recordCheckbox");
        const fixationBtns = document.querySelectorAll(".fixation-btn");

        // ---------- Глобальные переменные ----------
        let pose;
        let cameraInstance = null;
        let isActive = false;

        let handMode = "single"; // 'single' или 'both'
        let minElbowAngle = 155;

        handButtons.forEach((btn) => {
          btn.addEventListener("click", () => {
            if (isActive) {
              if (!confirm("Смена режима рук сбросит счётчик. Продолжить?"))
                return;
            }
            handButtons.forEach((b) => b.classList.remove("active"));
            btn.classList.add("active");
            handMode = btn.dataset.hand;
            if (isActive) setStatus("Режим сменён", "idle");
          });
        });

        fixationBtns.forEach((btn) => {
          btn.addEventListener("click", () => {
            if (btn.dataset.mode === "with-fixation") {
              minElbowAngle = 150;
            } else {
              minElbowAngle = 90;
            }
            minAngleSlider.value = minElbowAngle;
            minAngleValue.textContent = minElbowAngle + "°";
          });
        });

        // ---------- Кнопки Старт/Стоп ----------
        async function onStart() {
          if (isActive) return;
          let targetUrl = "process.html?handMode=" + handMode;
          if (recordCheckBox.checked) targetUrl += "&record=1";
          window.location.href = targetUrl;
        }

        startBtn.addEventListener("click", onStart);
      })();
    </script>
  </body>
</html>
